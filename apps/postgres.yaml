apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BoeingPo/py-bay-fast-api-gitops
    targetRevision: main
    path: postgres
  destination:
    server: https://kubernetes.default.svc
    namespace: py-bay-fast-api
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
