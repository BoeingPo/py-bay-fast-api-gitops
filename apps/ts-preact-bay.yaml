apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ts-preact-bay
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/BoeingPo/ts-preact-bay
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: py-bay-fast-api
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
